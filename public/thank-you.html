<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You - SARMAK Registration</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0d0e10;
        color: #f7f7f7;
        font-family: Inter, system-ui, sans-serif;
      }
      .card {
        max-width: 720px;
        width: 100%;
        padding: 40px;
        border-radius: 32px;
        background: rgba(15, 17, 19, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 40px 120px rgba(0, 0, 0, 0.35);
        text-align: center;
      }
      .title {
        font-size: clamp(2rem, 3vw, 3rem);
        margin-bottom: 16px;
      }
      .text {
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.8;
        margin-bottom: 32px;
      }
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 16px 30px;
        border-radius: 999px;
        background: linear-gradient(90deg, #22c55e, #4ade80);
        color: #0d0e10;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <p class="title">Thank you for registering!</p>
      <p class="text">
        Your registration has been received. We will contact you soon with next steps and cohort details for the SARMAK 4-week training program.
      </p>
      <a class="button" href="/">
        Back to SARMAK
      </a>
    </div>
  </body>
</html>
